# App-side Kconfig additions when building with MCUboot/OTA
# These are merged into the app's config by sysbuild.cmake

# MCUboot image manager
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_REBOOT=y

# TCP + HTTP client for OTA downloads
CONFIG_NET_TCP=y
CONFIG_HTTP_CLIENT=y

# Heap for HTTP client internals
CONFIG_HEAP_MEM_POOL_SIZE=8192

# Tell imgtool to pad the header (S32K3 IVT prevents ROM_START_OFFSET)
CONFIG_MCUBOOT_EXTRA_IMGTOOL_ARGS="--pad-header"
