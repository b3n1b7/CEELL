# MCUboot Configuration for CEELL
# Swap using scratch partition on external QSPI
CONFIG_BOOT_SWAP_USING_SCRATCH=y

# ECDSA-P256 image signing
CONFIG_BOOT_SIGNATURE_TYPE_ECDSA_P256=y
CONFIG_BOOT_SIGNATURE_TYPE_RSA=n

# Downgrade prevention — reject images with older version
CONFIG_MCUBOOT_DOWNGRADE_PREVENTION=y

# Logging
CONFIG_BOOT_BANNER=y
CONFIG_MCUBOOT_LOG_LEVEL_INF=y

# Flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# S32K344 internal flash support
CONFIG_BOOT_MAX_IMG_SECTORS=64
