# CEELL Middleware - Base Configuration

# Networking
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_IPV4_IGMP=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_DHCPV4=n

# IP set programmatically by ceell_net_setup() — no compile-time address
CONFIG_NET_CONFIG_SETTINGS=n

# Network buffers
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_MAX_CONTEXTS=6

# JSON
CONFIG_JSON_LIBRARY=y

# Flash
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Threading
CONFIG_MAIN_STACK_SIZE=2048
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# Logging
CONFIG_PRINTK=y

# Random (needed by networking stack)
CONFIG_TEST_RANDOM_GENERATOR=y

# No dynamic allocation
CONFIG_HEAP_MEM_POOL_SIZE=0

# CEELL app defaults (un-provisioned identity)
CONFIG_CEELL_DISCOVERY_PORT=5555
CONFIG_CEELL_DISCOVERY_GROUP="224.0.1.100"
CONFIG_CEELL_DISCOVERY_INTERVAL_MS=1000
CONFIG_CEELL_DISCOVERY_MAX_PEERS=8
CONFIG_CEELL_NODE_ID_DEFAULT=0
CONFIG_CEELL_NODE_ROLE_DEFAULT="unknown"
CONFIG_CEELL_NODE_NAME_DEFAULT="ceell-unprovisioned"
CONFIG_CEELL_NODE_IP_DEFAULT="192.168.1.100"
CONFIG_CEELL_NODE_NETMASK_DEFAULT="255.255.255.0"
CONFIG_CEELL_MAX_SERVICES=4
CONFIG_CEELL_MSG_PORT=5556
CONFIG_CEELL_PEER_TIMEOUT_MS=5000
CONFIG_CEELL_TEST_ECHO_SERVICE=y
