name: CEELL Renode Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/zephyrproject-rtos/ci:v0.27.4

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ceell-app

      - name: Initialize West workspace
        working-directory: ceell-app
        run: |
          west init -l .
          west update

      - name: Install Zephyr SDK
        run: |
          wget -q https://github.com/zephyrproject-rtos/sdk-ng/releases/download/v0.17.0/zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz
          tar xf zephyr-sdk-0.17.0_linux-x86_64_minimal.tar.xz -C /opt/
          /opt/zephyr-sdk-0.17.0/setup.sh -t arm-zephyr-eabi -c

      - name: Build single binary
        working-directory: ceell-app
        run: |
          west build -b mr_canhubk3 -d build

      - name: Generate flash config binaries
        working-directory: ceell-app
        run: |
          python3 tools/gen_config_bin.py config/node_body.json config/body_config.bin
          python3 tools/gen_config_bin.py config/node_chassis.json config/chassis_config.bin
          python3 tools/gen_config_bin.py config/node_lights.json config/lights_config.bin

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ceell-build
          path: |
            ceell-app/build/zephyr/zephyr.elf
            ceell-app/config/body_config.bin
            ceell-app/config/chassis_config.bin
            ceell-app/config/lights_config.bin

  test:
    runs-on: ubuntu-latest
    needs: build
    container:
      image: antmicro/renode:1.16.1
      options: --user root

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: ceell-build
          path: .

      - name: Verify artifacts
        run: |
          ls -la build/zephyr/zephyr.elf
          ls -la config/*.bin

      - name: Run Boot Test
        run: renode-test tests/robot/test_boot.robot

      - name: Run Discovery Test
        run: renode-test tests/robot/test_discovery.robot

      - name: Run Services Test
        run: renode-test tests/robot/test_services.robot

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renode-test-results
          path: |
            report.html
            log.html
            robot_output.xml
